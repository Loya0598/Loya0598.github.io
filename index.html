<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>World Reading Map</title>
  <link rel="icon" type="image/x-icon" href="./img/favicon.ico" />
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #dbe3ef;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --highlight: #93c5fd;
      --has-data: #60a5fa;
      --danger: #dc2626;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(320px, 380px) 1fr;
    }

    .sidebar {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-right: 1px solid var(--line);
      padding: 20px;
      overflow-y: auto;
      min-height: 100vh;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 17px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fbfdff;
    }

    .stat .num {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .stat .label {
      font-size: 12px;
      color: var(--muted);
    }

    .search-box input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      outline: none;
      background: #fff;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      display: inline-block;
    }

    .dot.normal { background: #e8eef8; }
    .dot.data { background: var(--has-data); }
    .dot.active { background: var(--accent); }

    .country-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 28vh;
      overflow-y: auto;
    }

    .country-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fcfdff;
      cursor: pointer;
      transition: .2s ease;
    }

    .country-item:hover { transform: translateY(-1px); }
    .country-item.active {
      border-color: var(--accent);
      background: #f8fbff;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.08);
    }

    .country-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .country-name {
      font-size: 15px;
      font-weight: 700;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: var(--accent-soft);
      color: var(--accent);
      white-space: nowrap;
    }

    .country-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .main {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }

    .toolbar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      pointer-events: none;
    }

    .toolbar-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    button {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
      box-shadow: var(--shadow);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    button.danger {
      color: var(--danger);
    }

    .mini-btn {
      padding: 7px 10px;
      border-radius: 10px;
      font-size: 12px;
      box-shadow: none;
      background: #f8fafc;
    }

    .mini-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .mini-btn.danger {
      color: var(--danger);
      background: #fff5f5;
      border-color: #fecaca;
    }

    .map-wrap {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .map-shell {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #f8fbff 0%, #eef4fb 45%, #eaf0f7 100%);
      border-radius: 28px;
      border: 1px solid rgba(219, 227, 239, 0.8);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    svg#worldMap {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: pan-x pan-y;
    }

    .country-path {
      fill: #e8eef8;
      stroke: #ffffff;
      stroke-width: 1.1;
      transition: fill 0.15s ease, stroke 0.15s ease, opacity 0.15s ease;
      cursor: pointer;
    }

    .country-path:hover { fill: var(--highlight); }
    .country-path.has-data { fill: var(--has-data); }
    .country-path.active {
      fill: var(--accent);
      stroke: #0f172a;
      stroke-width: 1.4;
    }
    .country-path.dimmed { opacity: 0.55; }

    .tooltip {
      position: absolute;
      min-width: 180px;
      max-width: 260px;
      background: rgba(255,255,255,0.97);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px;
      z-index: 30;
      pointer-events: none;
      transform: translate(12px, 12px);
      display: none;
    }

    .tooltip.visible { display: block; }
    .tooltip-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .tooltip-sub { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .tooltip-row { font-size: 13px; margin-top: 4px; }

    .detail-panel {
      position: absolute;
      top: 24px;
      right: 24px;
      width: min(430px, calc(100vw - 48px));
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      z-index: 25;
      padding: 18px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .detail-title {
      font-size: 24px;
      font-weight: 800;
      margin: 0;
    }

    .detail-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.6;
    }

    .section { margin-top: 18px; }
    .section h3 { margin: 0 0 10px; font-size: 15px; }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .photo-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .photo-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: #f1f5f9;
    }

    .photo-caption {
      padding: 8px 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .book-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .book-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      background: #fff;
    }

    .book-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .book-cover {
      width: 56px;
      height: 76px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #f8fafc;
      flex-shrink: 0;
    }

    .book-title { font-size: 15px; font-weight: 800; margin: 0 0 4px; }
    .book-author { font-size: 12px; color: var(--muted); }

    .note-list {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .note-item {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
    }

    .note-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .note-content { font-size: 13px; color: #334155; line-height: 1.65; white-space: pre-wrap; }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    .form-grid.two {
      grid-template-columns: 1fr 1fr;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .form-textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.6;
    }

    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .subtle-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    .editor-box {
      margin-top: 12px;
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: #fbfdff;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      background: rgba(248, 250, 252, 0.8);
    }

    .footer-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        min-height: auto;
        border-right: none;
        border-bottom: 1px solid var(--line);
      }
      .main { min-height: 70vh; }
      .map-wrap { height: 72vh; padding: 12px; }
      .detail-panel {
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 12px;
        width: auto;
        max-height: 56vh;
        border-radius: 22px;
      }
      .toolbar {
        top: 10px;
        left: 10px;
        right: 10px;
        flex-direction: column;
        align-items: stretch;
      }
      .toolbar-group { justify-content: flex-start; }
    }

    @media (max-width: 640px) {
      .sidebar { padding: 14px; }
      .title { font-size: 24px; }
      .stats { grid-template-columns: 1fr 1fr 1fr; }
      .map-wrap { height: 62vh; padding: 10px; }
      .map-shell { border-radius: 20px; }
      .detail-title { font-size: 20px; }
      .photo-grid { grid-template-columns: 1fr 1fr; }
      .country-list { max-height: 24vh; }
      .form-grid.two { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="title">World Reading Map</h1>
      <div class="subtitle">
        一个可直接部署到 GitHub Pages 的静态网页原型。世界地图从本地 world.geojson 加载；书籍与笔记支持在线添加、编辑和删除，并自动保存到当前浏览器本地。
      </div>

      <section class="card">
        <h2>概览</h2>
        <div class="stats">
          <div class="stat"><div class="num" id="statCountries">0</div><div class="label">已记录国家</div></div>
          <div class="stat"><div class="num" id="statBooks">0</div><div class="label">书籍总数</div></div>
          <div class="stat"><div class="num" id="statPhotos">0</div><div class="label">照片总数</div></div>
        </div>
      </section>

      <section class="card search-box">
        <h2>搜索国家</h2>
        <input id="searchInput" placeholder="输入国家名，例如 Italy / Japan / France" />
        <div class="footer-note">点击左侧列表或地图区域即可查看详情。</div>
      </section>

      <section class="card">
        <h2>图例</h2>
        <div class="legend">
          <div class="legend-item"><span class="dot normal"></span><span>普通国家</span></div>
          <div class="legend-item"><span class="dot data"></span><span>已有记录</span></div>
          <div class="legend-item"><span class="dot active"></span><span>当前选中</span></div>
        </div>
      </section>

      <section class="card">
        <h2>已记录国家</h2>
        <div class="country-list" id="countryList"></div>
      </section>

      <section class="card">
        <h2>本地数据说明</h2>
        <div class="footer-note">
          不再内置默认国家数据。页面启动时只从 data.json 读取；保存并导出时，会自动删除那些既没有图片也没有书籍的国家条目。
        </div>
      </section>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="toolbar-group">
          <button class="primary" id="resetViewBtn">重置视图</button>
          <button id="showRecordedBtn">仅看有记录国家</button>
        </div>
        <div class="toolbar-group">
          <button id="reloadDataBtn">重新读取 data.json</button>
          <button id="saveJsonBtn">保存并导出 data.json</button>
        </div>
      </div>

      <div class="map-wrap">
        <div class="map-shell">
          <svg id="worldMap" viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet" aria-label="world map">
            <g id="countriesLayer"></g>
          </svg>
          <div class="tooltip" id="tooltip"></div>
          <div class="detail-panel" id="detailPanel"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script>
    const STORAGE_KEY = 'world-reading-map-editable-v1';

    let countryData = { countries: [] };
    let dataMap = new Map();
    let activeCountryId = null;
    let showRecordedOnly = false;
    let worldFeatures = [];

    const countriesLayer = document.getElementById('countriesLayer');
    const tooltip = document.getElementById('tooltip');
    const detailPanel = document.getElementById('detailPanel');
    const countryList = document.getElementById('countryList');
    const searchInput = document.getElementById('searchInput');
    const statCountries = document.getElementById('statCountries');
    const statBooks = document.getElementById('statBooks');
    const statPhotos = document.getElementById('statPhotos');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const showRecordedBtn = document.getElementById('showRecordedBtn');
    const reloadDataBtn = document.getElementById('reloadDataBtn');
    const saveJsonBtn = document.getElementById('saveJsonBtn');
    const mapShell = document.querySelector('.map-shell');

    function escapeHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function normalizeCountryRecord(item) {
      return {
        id: item?.id || '',
        name: item?.name || item?.id || '',
        photos: Array.isArray(item?.photos) ? item.photos : [],
        books: Array.isArray(item?.books)
          ? item.books.map(book => ({
              title: book?.title || '',
              author: book?.author || '',
              cover: book?.cover || '',
              notes: Array.isArray(book?.notes)
                ? book.notes.map(note => ({
                    title: note?.title || '',
                    content: note?.content || ''
                  }))
                : []
            }))
          : []
      };
    }

    function hasActualContent(item) {
      const photos = Array.isArray(item?.photos) ? item.photos.length : 0;
      const books = Array.isArray(item?.books) ? item.books.length : 0;
      return photos > 0 || books > 0;
    }

    function normalizeCountryData(raw) {
      const countries = Array.isArray(raw?.countries) ? raw.countries : [];
      return {
        countries: countries
          .map(normalizeCountryRecord)
          .filter(item => item.id)
          .filter(hasActualContent)
      };
    }

    async function loadDataFromFile() {
      const response = await fetch('./data.json', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('data.json 加载失败');
      }
      const raw = await response.json();
      return normalizeCountryData(raw);
    }

    function syncDataMap() {
      dataMap = new Map(countryData.countries.map(item => [item.id, item]));
    }

    function setCountryData(data) {
      countryData = normalizeCountryData(data);
      syncDataMap();
      activeCountryId = countryData.countries[0]?.id || null;
    }

    function persistData() {
      countryData = normalizeCountryData(countryData);
      syncDataMap();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(countryData));
    }

    async function loadEditableData({ forceFile = false } = {}) {
      if (!forceFile) {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            const normalized = normalizeCountryData(parsed);
            if (normalized.countries.length > 0) {
              return normalized;
            }
          }
        } catch (e) {}
      }

      try {
        const fileData = await loadDataFromFile();
        return fileData;
      } catch (e) {
        return { countries: [] };
      }
    }

    function getCountryRecord(id) {
      return dataMap.get(id) || null;
    }

    function getOrCreateCountryRecord(id, fallbackName) {
      let record = getCountryRecord(id);
      if (record) return record;
      record = { id, name: fallbackName || id, photos: [], books: [] };
      countryData.countries.push(record);
      persistData();
      return record;
    }

    function hasRecord(id) {
      const item = getCountryRecord(id);
      return !!(item && hasActualContent(item));
    }

    function getSummary(id) {
      const item = getCountryRecord(id);
      return {
        photos: item?.photos?.length || 0,
        books: item?.books?.length || 0,
        notes: (item?.books || []).reduce((sum, b) => sum + (b.notes?.length || 0), 0)
      };
    }

    function getFeatureId(feature) {
      return feature.properties?.iso_a3 || feature.id || feature.properties?.name;
    }

    function getFeatureName(feature) {
      return feature.properties?.name || feature.properties?.admin || getFeatureId(feature) || 'Unknown';
    }

    function renderStats() {
      const countriesCount = countryData.countries.length;
      const booksCount = countryData.countries.reduce((sum, c) => sum + (c.books?.length || 0), 0);
      const photosCount = countryData.countries.reduce((sum, c) => sum + (c.photos?.length || 0), 0);
      statCountries.textContent = countriesCount;
      statBooks.textContent = booksCount;
      statPhotos.textContent = photosCount;
    }

    function renderCountryList(filter = '') {
      const keyword = filter.trim().toLowerCase();
      const items = countryData.countries
        .filter(item => !keyword || item.name.toLowerCase().includes(keyword) || item.id.toLowerCase().includes(keyword))
        .sort((a, b) => a.name.localeCompare(b.name));

      if (!items.length) {
        countryList.innerHTML = '<div class="empty">data.json 中当前没有可展示的国家记录。</div>';
        return;
      }

      countryList.innerHTML = items.map(item => {
        const summary = getSummary(item.id);
        return `
          <div class="country-item ${item.id === activeCountryId ? 'active' : ''}" data-country-card="${item.id}">
            <div class="country-top">
              <div class="country-name">${escapeHtml(item.name)}</div>
              <div class="badge">已记录</div>
            </div>
            <div class="country-meta">
              <span>📷 ${summary.photos} 张照片</span>
              <span>📚 ${summary.books} 本书</span>
              <span>📝 ${summary.notes} 条笔记</span>
            </div>
          </div>
        `;
      }).join('');

      countryList.querySelectorAll('[data-country-card]').forEach(node => {
        node.addEventListener('click', () => {
          activeCountryId = node.dataset.countryCard;
          highlightActiveCountry();
          renderCountryList(searchInput.value);
          renderDetailPanel();
        });
      });
    }

    function showTooltip(event, feature) {
      const countryId = getFeatureId(feature);
      const name = getFeatureName(feature);
      const summary = getSummary(countryId);
      const item = getCountryRecord(countryId);
      const latestBook = item?.books?.[0]?.title;

      tooltip.innerHTML = `
        <div class="tooltip-title">${escapeHtml(name)}</div>
        <div class="tooltip-sub">${hasRecord(countryId) ? '已有本地记录' : '暂无本地记录'}</div>
        <div class="tooltip-row">📷 照片：${summary.photos}</div>
        <div class="tooltip-row">📚 书籍：${summary.books}</div>
        <div class="tooltip-row">📝 笔记：${summary.notes}</div>
        ${latestBook ? `<div class="tooltip-row">最近书籍：${escapeHtml(latestBook)}</div>` : ''}
      `;

      const shellRect = mapShell.getBoundingClientRect();
      tooltip.style.left = `${event.clientX - shellRect.left}px`;
      tooltip.style.top = `${event.clientY - shellRect.top}px`;
      tooltip.classList.add('visible');
    }

    function highlightActiveCountry() {
      countriesLayer.querySelectorAll('.country-path').forEach(node => {
        const id = node.dataset.country;
        node.classList.toggle('active', id === activeCountryId);
        node.classList.toggle('has-data', hasRecord(id));
        node.classList.toggle('dimmed', showRecordedOnly && !hasRecord(id));
      });
    }

    function renderDetailPanel() {
      if (!activeCountryId) {
        detailPanel.innerHTML = '<div class="empty">请选择一个国家。</div>';
        return;
      }

      const feature = worldFeatures.find(f => getFeatureId(f) === activeCountryId);
      const name = feature ? getFeatureName(feature) : (getCountryRecord(activeCountryId)?.name || activeCountryId);
      const record = getCountryRecord(activeCountryId);
      const summary = getSummary(activeCountryId);

      detailPanel.innerHTML = `
        <div class="detail-header">
          <div>
            <h2 class="detail-title">${escapeHtml(name)}</h2>
            <div class="detail-subtitle">数据来源于 data.json；当前浏览器内的编辑会先存入 localStorage，导出时会自动清理空国家。</div>
          </div>
          <button onclick="clearSelection()">关闭</button>
        </div>

        <div class="stats">
          <div class="stat"><div class="num">${summary.photos}</div><div class="label">照片</div></div>
          <div class="stat"><div class="num">${summary.books}</div><div class="label">书籍</div></div>
          <div class="stat"><div class="num">${summary.notes}</div><div class="label">笔记</div></div>
        </div>

        <div class="section">
          <h3>照片</h3>
          ${record?.photos?.length ? `
            <div class="photo-grid">
              ${record.photos.map(photo => `
                <div class="photo-card">
                  <img src="${escapeHtml(photo.src)}" alt="${escapeHtml(photo.caption || 'photo')}" />
                  <div class="photo-caption">${escapeHtml(photo.caption || '未填写说明')}</div>
                </div>
              `).join('')}
            </div>
          ` : '<div class="empty">这个国家暂时没有照片记录。</div>'}
        </div>

        <div class="section">
          <h3>添加书籍</h3>
          <div class="editor-box">
            <div class="form-grid two">
              <div>
                <div class="subtle-label">书名</div>
                <input class="form-input" id="newBookTitle" placeholder="例如：Invisible Cities" />
              </div>
              <div>
                <div class="subtle-label">作者</div>
                <input class="form-input" id="newBookAuthor" placeholder="例如：Italo Calvino" />
              </div>
            </div>
            <div class="form-grid" style="margin-top:10px;">
              <div>
                <div class="subtle-label">封面图片链接（可选）</div>
                <input class="form-input" id="newBookCover" placeholder="https://... 或 assets/covers/..." />
              </div>
            </div>
            <div class="inline-actions">
              <button class="mini-btn primary" onclick="addBook()">添加书籍</button>
            </div>
          </div>
        </div>

        <div class="section">
          <h3>书籍与笔记</h3>
          ${record?.books?.length ? `
            <div class="book-list">
              ${record.books.map((book, bookIndex) => `
                <div class="book-card">
                  <div class="book-head">
                    ${book.cover ? `<img class="book-cover" src="${escapeHtml(book.cover)}" alt="${escapeHtml(book.title)}" />` : `<div class="book-cover"></div>`}
                    <div>
                      <div class="book-title">${escapeHtml(book.title)}</div>
                      <div class="book-author">${escapeHtml(book.author || '未填写作者')}</div>
                    </div>
                  </div>

                  <div class="inline-actions">
                    <button class="mini-btn" onclick="toggleBookEditor(${bookIndex})">编辑书籍</button>
                    <button class="mini-btn danger" onclick="deleteBook(${bookIndex})">删除书籍</button>
                    <button class="mini-btn primary" onclick="toggleNoteCreator(${bookIndex})">添加笔记</button>
                  </div>

                  <div id="bookEditor-${bookIndex}" class="editor-box" style="display:none;">
                    <div class="form-grid two">
                      <div>
                        <div class="subtle-label">书名</div>
                        <input class="form-input" id="editBookTitle-${bookIndex}" value="${escapeHtml(book.title)}" />
                      </div>
                      <div>
                        <div class="subtle-label">作者</div>
                        <input class="form-input" id="editBookAuthor-${bookIndex}" value="${escapeHtml(book.author || '')}" />
                      </div>
                    </div>
                    <div class="form-grid" style="margin-top:10px;">
                      <div>
                        <div class="subtle-label">封面图片链接</div>
                        <input class="form-input" id="editBookCover-${bookIndex}" value="${escapeHtml(book.cover || '')}" />
                      </div>
                    </div>
                    <div class="inline-actions">
                      <button class="mini-btn primary" onclick="saveBookEdit(${bookIndex})">保存书籍</button>
                    </div>
                  </div>

                  <div id="noteCreator-${bookIndex}" class="editor-box" style="display:none;">
                    <div class="form-grid">
                      <div>
                        <div class="subtle-label">笔记标题（可选）</div>
                        <input class="form-input" id="newNoteTitle-${bookIndex}" placeholder="例如：阅读随记" />
                      </div>
                      <div>
                        <div class="subtle-label">笔记内容</div>
                        <textarea class="form-textarea" id="newNoteContent-${bookIndex}" placeholder="写下你的想法、摘录或联想"></textarea>
                      </div>
                    </div>
                    <div class="inline-actions">
                      <button class="mini-btn primary" onclick="addNote(${bookIndex})">保存笔记</button>
                    </div>
                  </div>

                  <div class="note-list">
                    ${(book.notes && book.notes.length) ? book.notes.map((note, noteIndex) => `
                      <div class="note-item">
                        ${note.title ? `<div class="note-title">${escapeHtml(note.title)}</div>` : ''}
                        <div class="note-content">${escapeHtml(note.content || '')}</div>
                        <div class="inline-actions">
                          <button class="mini-btn" onclick="toggleNoteEditor(${bookIndex}, ${noteIndex})">编辑笔记</button>
                          <button class="mini-btn danger" onclick="deleteNote(${bookIndex}, ${noteIndex})">删除笔记</button>
                        </div>
                        <div id="noteEditor-${bookIndex}-${noteIndex}" class="editor-box" style="display:none;">
                          <div class="form-grid">
                            <div>
                              <div class="subtle-label">标题</div>
                              <input class="form-input" id="editNoteTitle-${bookIndex}-${noteIndex}" value="${escapeHtml(note.title || '')}" />
                            </div>
                            <div>
                              <div class="subtle-label">内容</div>
                              <textarea class="form-textarea" id="editNoteContent-${bookIndex}-${noteIndex}">${escapeHtml(note.content || '')}</textarea>
                            </div>
                          </div>
                          <div class="inline-actions">
                            <button class="mini-btn primary" onclick="saveNoteEdit(${bookIndex}, ${noteIndex})">保存笔记</button>
                          </div>
                        </div>
                      </div>
                    `).join('') : '<div class="empty">这本书暂时没有笔记。</div>'}
                  </div>
                </div>
              `).join('')}
            </div>
          ` : '<div class="empty">这个国家暂时没有书籍记录。你可以直接在上方添加。</div>'}
        </div>
      `;
    }

    function rerenderEditableViews() {
      persistData();
      renderStats();
      renderCountryList(searchInput.value);
      highlightActiveCountry();
      renderDetailPanel();
    }

    function addBook() {
      if (!activeCountryId) return;
      const title = document.getElementById('newBookTitle')?.value.trim();
      const author = document.getElementById('newBookAuthor')?.value.trim();
      const cover = document.getElementById('newBookCover')?.value.trim();
      if (!title) {
        alert('请输入书名。');
        return;
      }
      const feature = worldFeatures.find(f => getFeatureId(f) === activeCountryId);
      const record = getOrCreateCountryRecord(activeCountryId, feature ? getFeatureName(feature) : activeCountryId);
      record.books.unshift({ title, author, cover, notes: [] });
      rerenderEditableViews();
    }

    function saveBookEdit(bookIndex) {
      const record = getCountryRecord(activeCountryId);
      const book = record?.books?.[bookIndex];
      if (!book) return;
      const title = document.getElementById(`editBookTitle-${bookIndex}`)?.value.trim();
      const author = document.getElementById(`editBookAuthor-${bookIndex}`)?.value.trim();
      const cover = document.getElementById(`editBookCover-${bookIndex}`)?.value.trim();
      if (!title) {
        alert('书名不能为空。');
        return;
      }
      book.title = title;
      book.author = author;
      book.cover = cover;
      rerenderEditableViews();
    }

    function deleteBook(bookIndex) {
      const record = getCountryRecord(activeCountryId);
      if (!record?.books?.[bookIndex]) return;
      if (!confirm('确定删除这本书及其所有笔记吗？')) return;
      record.books.splice(bookIndex, 1);
      rerenderEditableViews();
    }

    function addNote(bookIndex) {
      const record = getCountryRecord(activeCountryId);
      const book = record?.books?.[bookIndex];
      if (!book) return;
      const title = document.getElementById(`newNoteTitle-${bookIndex}`)?.value.trim();
      const content = document.getElementById(`newNoteContent-${bookIndex}`)?.value.trim();
      if (!content) {
        alert('请输入笔记内容。');
        return;
      }
      book.notes = book.notes || [];
      book.notes.unshift({ title, content });
      rerenderEditableViews();
    }

    function saveNoteEdit(bookIndex, noteIndex) {
      const record = getCountryRecord(activeCountryId);
      const note = record?.books?.[bookIndex]?.notes?.[noteIndex];
      if (!note) return;
      const title = document.getElementById(`editNoteTitle-${bookIndex}-${noteIndex}`)?.value.trim();
      const content = document.getElementById(`editNoteContent-${bookIndex}-${noteIndex}`)?.value.trim();
      if (!content) {
        alert('笔记内容不能为空。');
        return;
      }
      note.title = title;
      note.content = content;
      rerenderEditableViews();
    }

    function deleteNote(bookIndex, noteIndex) {
      const record = getCountryRecord(activeCountryId);
      const notes = record?.books?.[bookIndex]?.notes;
      if (!notes?.[noteIndex]) return;
      if (!confirm('确定删除这条笔记吗？')) return;
      notes.splice(noteIndex, 1);
      rerenderEditableViews();
    }

    function toggleBlock(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function toggleBookEditor(bookIndex) {
      toggleBlock(`bookEditor-${bookIndex}`);
    }

    function toggleNoteCreator(bookIndex) {
      toggleBlock(`noteCreator-${bookIndex}`);
    }

    function toggleNoteEditor(bookIndex, noteIndex) {
      toggleBlock(`noteEditor-${bookIndex}-${noteIndex}`);
    }

    async function loadWorldMap() {
      countriesLayer.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#64748b" font-size="18">地图加载中…</text>';
      try {
        const response = await fetch('./world.geojson');
        const geojson = await response.json();
        worldFeatures = geojson.features || [];

        countriesLayer.innerHTML = '';
        const width = 1000;
        const height = 520;
        const projection = d3.geoNaturalEarth1().fitExtent([[16, 16], [width - 16, height - 16]], geojson);
        const pathGenerator = d3.geoPath(projection);

        worldFeatures.forEach(feature => {
          const pathNode = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const id = getFeatureId(feature);
          pathNode.setAttribute('d', pathGenerator(feature));
          pathNode.setAttribute('class', 'country-path');
          pathNode.dataset.country = id;
          pathNode.setAttribute('aria-label', getFeatureName(feature));

          pathNode.addEventListener('mouseenter', (e) => showTooltip(e, feature));
          pathNode.addEventListener('mousemove', (e) => showTooltip(e, feature));
          pathNode.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
          pathNode.addEventListener('click', () => {
            activeCountryId = id;
            highlightActiveCountry();
            renderCountryList(searchInput.value);
            renderDetailPanel();
          });

          countriesLayer.appendChild(pathNode);
        });

        highlightActiveCountry();
        renderDetailPanel();
      } catch (error) {
        countriesLayer.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#dc2626" font-size="18">世界地图加载失败，请检查本地 world.geojson 文件是否存在。</text>';
        console.error(error);
      }
    }

    function clearSelection() {
      activeCountryId = null;
      highlightActiveCountry();
      renderCountryList(searchInput.value);
      renderDetailPanel();
    }

    async function reloadDataFromFile() {
      const fileData = await loadEditableData({ forceFile: true });
      setCountryData(fileData);
      localStorage.removeItem(STORAGE_KEY);
      renderStats();
      renderCountryList(searchInput.value);
      highlightActiveCountry();
      renderDetailPanel();
    }

    searchInput.addEventListener('input', () => {
      renderCountryList(searchInput.value);
    });

    resetViewBtn.addEventListener('click', () => {
      searchInput.value = '';
      showRecordedOnly = false;
      showRecordedBtn.textContent = '仅看有记录国家';
      activeCountryId = countryData.countries[0]?.id || null;
      highlightActiveCountry();
      renderCountryList();
      renderDetailPanel();
    });

    showRecordedBtn.addEventListener('click', () => {
      showRecordedOnly = !showRecordedOnly;
      showRecordedBtn.textContent = showRecordedOnly ? '显示全部国家' : '仅看有记录国家';
      highlightActiveCountry();
    });

    reloadDataBtn.addEventListener('click', async () => {
      await reloadDataFromFile();
    });

    saveJsonBtn.addEventListener('click', () => {
      persistData();
      const cleaned = normalizeCountryData(countryData);
      const blob = new Blob([JSON.stringify(cleaned, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'data.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    window.clearSelection = clearSelection;
    window.addBook = addBook;
    window.saveBookEdit = saveBookEdit;
    window.deleteBook = deleteBook;
    window.addNote = addNote;
    window.saveNoteEdit = saveNoteEdit;
    window.deleteNote = deleteNote;
    window.toggleBookEditor = toggleBookEditor;
    window.toggleNoteCreator = toggleNoteCreator;
    window.toggleNoteEditor = toggleNoteEditor;

    async function init() {
      const loaded = await loadEditableData();
      setCountryData(loaded);
      renderStats();
      renderCountryList();
      await loadWorldMap();
    }

    init();
  </script>
</body>
</html>
